{% extends "base.html" %}

{% block body %}

<h2>Manage Enrollment Deadlines</h2>
<div class="login-container">
<h3>Add Deadline</h3>

<form method="POST">

<label>Semester:</label>

<select name="semester_id">

{% for semester in semesters %}

<option value="{{ semester.id }}">
{{ semester.semester_name }}
</option>

{% endfor %}

</select>

<br><br>

<label>Deadline Date:</label>

<input type="date" name="deadline" required>

<br><br>

<button type="submit">Add Deadline</button>

</form>
</div>
<br><br>

<div class="table-container">
<h3>Existing Deadlines</h3>

<table>
<thead>
<tr>
<th>Semester</th>
<th>Deadline</th>
<th>Action</th>
</tr>
</thead>
{% for d in deadlines %}
<tbody>
<tr>

<td>{{ d.semester_name }}</td>
<td>{{ d.deadline_date }}</td>

<td>
<a href="/delete_deadline/{{ d.id }}">Delete</a>
</td>

</tr>
</tbody>
{% endfor %}

</table>
</div>
{% endblock %}
