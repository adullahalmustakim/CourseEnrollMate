{% extends "base.html" %}

{% block body %}

<div class="table-container">

    <h2>Manage Course Offerings</h2>

    <div class="actions" style="text-align: right;">
        <a href="/add_course_offering">Add Course Offering</a>
    </div>

    <table>

        <thead>
        <tr>
            <th>Course</th>
            <th>Semester</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>

{% for o in offerings %}

        <tr>

            <td>
{{ o.course_code }} - {{ o.course_title }}
            </td>

            <td>
{{ o.semester_name }}
            </td>

            <td>
            <a href="/delete_course_offering/{{ o.id }}" class="delete-btn">Delete</a>
            </td>

        </tr>

{% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
