{% extends "base.html" %}

{% block body %}

<div class="login-container">

    <h3>Add New Course</h3>
    {% with messages = get_flashed_messages() %}
        {% if messages %}
            <div class="flash-messages">
                {% for message in messages %}
                    <p style="color:red;">{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('add_course') }}" novalidate>

        <label>Course Code:</label>
        <input 
            type="text" 
            name="course_code" 
            placeholder="Course Code"
            minlength="3"
            maxlength="10"
            pattern="^[A-Za-z0-9]+$"
            title="Only letters and numbers (e.g. CSE101)"
            required
        >

        <label>Course Title:</label>
        <input 
            type="text" 
            name="course_title" 
            placeholder="Course Title"
            minlength="3"
            maxlength="100"
            required
        >

        <label>Course Description:</label>
        <textarea 
            name="course_description" 
            placeholder="Course Description (optional)"
            maxlength="500"
        ></textarea>

        <label>Credit Hours:</label>
        <input 
            type="number" 
            name="credit_hours" 
            placeholder="1 - 6"
            min="1"
            max="6"
            required
        >

        <button type="submit">Add Course</button>

    </form>

</div>

<script>
document.querySelector("form").addEventListener("submit", function(e) {
    const code = document.querySelector("input[name='course_code']").value.trim();
    const credit = document.querySelector("input[name='credit_hours']").value;

    document.querySelector("input[name='course_code']").value = code.toUpperCase();

    if (credit < 1 || credit > 6) {
        e.preventDefault();
        alert("Credit hours must be between 1 and 6");
    }
});
</script>

{% endblock %}
